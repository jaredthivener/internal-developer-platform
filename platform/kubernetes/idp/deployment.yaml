apiVersion: apps/v1
kind: Deployment
metadata:
  name: idp-web
  namespace: idp-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: idp-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: idp-web
    spec:
      serviceAccountName: idp-web
      nodeSelector:
        kubernetes.io/arch: arm64
        kubernetes.io/os: linux
      containers:
        - name: idp-web
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: idp-app-env
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi